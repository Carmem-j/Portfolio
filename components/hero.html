<section
  id="sobre"
  class="relative max-w-6xl mx-auto px-6 py-16 md:py-28"
>
  <div class="grid md:grid-cols-12 gap-16 items-center">
    <div class="md:col-span-7">
      <span
        class="text-blue-600 font-bold text-xs uppercase tracking-[0.2em] mb-4 block text-center md:text-left"
        data-i18n="hero-tag"
      ></span>
      <h1
        class="text-4xl md:text-6xl font-bold leading-[1.1] mb-8 text-center md:text-left"
        data-i18n="hero-title"
      ></h1>
      <p
        class="text-xl text-zinc-500 mb-10 leading-relaxed max-w-2xl text-center md:text-left"
        data-i18n="hero-desc"
      ></p>

      <div class="flex flex-wrap gap-4 justify-center md:justify-start">
        <a
          href="#projetos"
          class="bg-zinc-900 text-white px-8 py-4 rounded-full font-bold hover:bg-zinc-800 transition-all"
          data-i18n="btn-projects"
          title="View Projects"
        ></a>
        <a
          href="#contato"
          class="border border-zinc-200 text-zinc-900 px-8 py-4 rounded-full font-medium hover:bg-zinc-50 transition-all"
          data-i18n="nav-contact"
          title="Contact"
        ></a>
      </div>
    </div>
    <div class="md:col-span-5">
      <figure>
        <div
          class="aspect-[4/5] bg-zinc-100 rounded-3xl overflow-hidden relative shadow-inner"
        >
          <img
            src="images/profile_2.jpg"
            alt="Foto de Carmem Ferreira"
            width="800"
            height="1000"
            fetchpriority="high"
            decoding="async"
            class="w-full h-full object-cover transition-transform duration-500"
          />
        </div>
      </figure>
    </div>
  </div>

  <a
    href="#projetos"
    aria-label="Rolar para projetos"
    class="hidden md:flex absolute bottom-2 left-1/2 -translate-x-1/2 text-zinc-300 hover:text-zinc-600 animate-bounce transition-colors"
  >
    <svg
      width="28"
      height="28"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      viewBox="0 0 24 24"
      aria-hidden="true"
    >
      <path d="m6 9 6 6 6-6" />
    </svg>
  </a>
</section>
